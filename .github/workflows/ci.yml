# CI workflow for pull requests and pushes to main.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go test -v -count=1 -race ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go build -o terraform-provider-openmetadata .

  resource-test-coverage:
    name: Every resource has an acceptance test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check resource → test file mapping
        run: |
          # Every .go file in internal/resources/ (except common.go) must have a
          # matching *_resource_test.go in internal/provider/.
          #
          # Naming convention:
          #   internal/resources/my_resource.go
          #   → internal/provider/my_resource_resource_test.go
          #
          # To add a new resource, you must also add the corresponding test file.
          MISSING=()
          for res in internal/resources/*.go; do
            base="$(basename "$res" .go)"
            [ "$base" = "common" ] && continue
            test_file="internal/provider/${base}_resource_test.go"
            if [ ! -f "$test_file" ]; then
              MISSING+=("$test_file (resource: $res)")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: The following resource files are missing acceptance tests:"
            for m in "${MISSING[@]}"; do
              echo "  - $m"
            done
            echo ""
            echo "Every resource in internal/resources/ (except common.go) must have"
            echo "a corresponding acceptance test in internal/provider/."
            exit 1
          fi
          echo "All resources have acceptance tests. ✓"
